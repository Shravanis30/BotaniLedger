name: BotaniLedger CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_ACCESS_SECRET: test_secret_test_secret_test_secret_test_secret
          JWT_REFRESH_SECRET: test_refresh_test_refresh_test_refresh_test_refresh
